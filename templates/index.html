<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hemanth AI</title>
<link rel="stylesheet" href="/static/style.css">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#eef1f4}
.auth-screen{
  min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;
}
.login-box{
  width:1100px;max-width:95%;background:#fff;border-radius:20px;overflow:hidden;
  display:grid;grid-template-columns:1fr 1fr;box-shadow:0 20px 40px rgba(0,0,0,.12);
}
.left{padding:48px}
.left h1{margin:10px 0}
.muted{color:#666;margin-bottom:20px}
.form-input{
  width:100%;padding:14px;border:1px solid #ddd;border-radius:10px;
  margin:10px 0;font-size:15px;
}
.form-btn{
  width:100%;padding:14px;border:none;border-radius:10px;
  background:#111;color:#fff;font-weight:700;margin-top:10px;cursor:pointer;
}
.form-btn.alt{background:#fff;color:#111;border:1px solid #ddd}
.right{
  background:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop') center/cover;
  position:relative;
}
.overlay{
  position:absolute;left:20px;right:20px;bottom:20px;
  background:rgba(255,255,255,.18);color:#fff;padding:18px;
  border-radius:18px;backdrop-filter:blur(8px);
}
.app{display:none;height:100vh}
.sidebar{width:300px;background:#f5f5f5;padding:20px;overflow:auto}
.chat-shell{flex:1;display:flex;flex-direction:column}
.chat-box{flex:1;padding:20px;overflow:auto}
.input-area{display:flex;padding:15px;border-top:1px solid #ddd}
.input-area input{flex:1;padding:12px}
.input-area button{width:60px}
.user-msg,.bot-msg{padding:12px;border-radius:12px;margin:8px 0;max-width:75%}
.user-msg{background:#dbeafe;margin-left:auto}
.bot-msg{background:#eee}
button{padding:10px 12px;margin:4px 0;width:100%;cursor:pointer}
.session-item{display:flex;gap:6px}
.mini{width:auto;padding:6px 8px}
@media(max-width:900px){
  .login-box{grid-template-columns:1fr}
  .right{min-height:300px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="auth-screen" class="auth-screen">
  <div class="login-box">
    <div class="left">
      <h1>Welcome Back</h1>
      <p class="muted">Login or create account</p>

      <input id="username" class="form-input" placeholder="Username">
      <input id="password" type="password" class="form-input" placeholder="Password">

      <button class="form-btn" onclick="login()">Sign In</button>
      <button class="form-btn alt" onclick="signup()">Create Account</button>

      <p id="auth-msg"></p>
    </div>

    <div class="right">
      <div class="overlay">
        <b>Hemanth AI</b><br>
        Premium Experience
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="main-app">
  <aside class="sidebar">
    <h2>Hemanth AI</h2>

    <button onclick="createNewSession()">＋ New Chat</button>
    <button onclick="logout()">🚪 Logout</button>
    <button onclick="openAnalytics()">📊 Analytics</button>
    <button onclick="exportTXT()">📄 Export TXT</button>
    <button onclick="exportPDF()">📕 Export PDF</button>

    <div id="session-list"></div>

    <hr>

    <input type="file" id="fileInput">
    <button onclick="uploadFile()">📁 Upload</button>
  </aside>

  <main class="chat-shell">
    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
      <input id="message" placeholder="Type message...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </main>
</div>

<!-- ANALYTICS -->
<div id="analytics-modal" class="auth-screen" style="display:none;">
  <div class="login-box" style="grid-template-columns:1fr;max-width:500px;">
    <div class="left">
      <h2>Analytics</h2>
      <div id="stats-box"></div>
      <button class="form-btn" onclick="closeAnalytics()">Close</button>
    </div>
  </div>
</div>

<script>
const box = document.getElementById("chat-box");
const input = document.getElementById("message");
const sessionList = document.getElementById("session-list");

let currentUser = localStorage.getItem("user_id");
let currentSession = null;

window.onload = async () => {
  if(currentUser){
    showApp();
    await loadSessions();
  }
};

function showApp(){
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("main-app").style.display="flex";
}

async function signup(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch("/signup",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  const data = await res.json();
  document.getElementById("auth-msg").innerText = data.message;
}

async function login(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  const data = await res.json();

  if(data.user_id){
    localStorage.setItem("user_id", data.user_id);
    currentUser = data.user_id;
    showApp();
    loadSessions();
  } else {
    document.getElementById("auth-msg").innerText = data.message;
  }
}

function logout(){
  localStorage.removeItem("user_id");
  location.reload();
}

async function loadSessions(){
  const res = await fetch(`/sessions/${currentUser}`);
  const data = await res.json();

  sessionList.innerHTML = "";

  data.sessions.forEach(item=>{
    sessionList.innerHTML += `
      <div class="session-item">
        <button onclick="openSession(${item[0]})">${item[1]} #${item[0]}</button>
        <button class="mini" onclick="deleteSession(${item[0]})">✕</button>
      </div>
    `;
  });

  if(data.sessions.length && currentSession===null){
    openSession(data.sessions[0][0]);
  }
}

async function createNewSession(){
  const res = await fetch(`/session/${currentUser}`,{method:"POST"});
  const data = await res.json();
  currentSession = data.session_id;
  box.innerHTML = "";
  loadSessions();
}

async function openSession(id){
  currentSession = id;

  const res = await fetch(`/history/${id}`);
  const data = await res.json();

  box.innerHTML = "";

  data.messages.forEach(item=>{
    box.innerHTML += item[0]==="user"
      ? `<div class="user-msg">${item[1]}</div>`
      : `<div class="bot-msg">${item[1]}</div>`;
  });

  box.scrollTop = box.scrollHeight;
}

async function deleteSession(id){
  await fetch(`/session/${id}`,{method:"DELETE"});
  currentSession = null;
  box.innerHTML = "";
  loadSessions();
}

async function sendMessage(){
  const msg = input.value.trim();
  if(!msg) return;

  if(currentSession===null){
    await createNewSession();
  }

  box.innerHTML += `<div class="user-msg">${msg}</div>`;
  input.value="";

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      question:msg,
      session_id:currentSession
    })
  });

  const data = await res.json();
  box.innerHTML += `<div class="bot-msg">${data.response}</div>`;
  box.scrollTop = box.scrollHeight;
}

function exportTXT(){
  if(currentSession) window.open(`/export/txt/${currentSession}`);
}

function exportPDF(){
  if(currentSession) window.open(`/export/pdf/${currentSession}`);
}

async function openAnalytics(){
  const res = await fetch("/analytics");
  const data = await res.json();

  document.getElementById("stats-box").innerHTML = `
    <p>👤 Users: ${data.users}</p>
    <p>💬 Sessions: ${data.sessions}</p>
    <p>📝 Messages: ${data.messages}</p>
  `;

  document.getElementById("analytics-modal").style.display="flex";
}

function closeAnalytics(){
  document.getElementById("analytics-modal").style.display="none";
}

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return;

  const fd = new FormData();
  fd.append("file", file);

  const res = await fetch("/upload",{
    method:"POST",
    body:fd
  });

  const data = await res.json();
  alert(data.message);
}
</script>

</body>
</html>
